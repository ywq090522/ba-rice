# ──────────────────────────────────────────────
#  Hyprlock Config — Character Theme
# ──────────────────────────────────────────────

background {
    monitor =
    path = /home/ywq/.ba-rice/current_wallpaper.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.5
    vibrancy = 0.2
}

# ── 时间（屏幕最上方中间）─────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(cdd6f4ff)
    font_size = 96
    font_family = CaskaydiaCove Nerd Font
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(1e1e2e88)
}

# ── 日期 ─────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%Y年%m月%d日 %A")"
    color = rgba(a6adc8ff)
    font_size = 18
    font_family = CaskaydiaCove Nerd Font
    position = 0, -150
    halign = center
    valign = center
}

# ── 用户头像（圆形）──────────────────────────
image {
    monitor =
    path = /home/ywq/.ba-rice/current_avatar.png
    size = 150
    rounding = -1
    border_size = 3
    border_color = rgba(cba6f7ee)
    position = 0, 50
    halign = center
    valign = center
}

# ── 用户名 ───────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgba(cba6f7ff)
    font_size = 20
    font_family = CaskaydiaCove Nerd Font
    position = 0, 130
    halign = center
    valign = center
}

# ── 密码输入框 ───────────────────────────────
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(cba6f7ee)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##a6adc8">密码...</span>
    hide_input = false
    position = 0, 180
    halign = center
    valign = center
    rounding = 12
}
