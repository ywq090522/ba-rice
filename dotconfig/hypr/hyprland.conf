# ──────────────────────────────────────────────
#  Hyprland Config — Catppuccin Mocha
# ──────────────────────────────────────────────

monitor = HDMI-A-1, 2560x1440@120.00Hz, 0x0, 1, vrr, 2, bitdepth, 10

$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun

# ── Startup ──────────────────────────────────
exec-once = swww-daemon &
exec-once = sleep 1 && swww img "$HOME/.ba-rice/current_wallpaper.png" --transition-type grow --transition-step 30 --transition-fps 60 --transition-duration 2
exec-once = waybar &
exec-once = fcitx5 -d
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = clash-party &
exec-once = mako &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Environment ──────────────────────────────
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = XCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = XCURSOR_SIZE,24

# ── General ──────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# ── Decoration ───────────────────────────────
decoration {
    rounding = 12
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1e1e2eee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        contrast = 1.1
        brightness = 0.8
        vibrancy = 0.2
        vibrancy_darkness = 0.5

        popups = true
        popups_ignorealpha = 0.2
    }
}

# ── Animations ───────────────────────────────
animations {
    enabled = yes

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.05
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = overshot, 0.4, 0.8, 0.2, 1.1
    bezier = bounce, 1, 1.6, 0.1, 0.85
    bezier = snappy, 0.2, 0, 0, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsIn, 1, 4, winIn, slide
    animation = windowsOut, 1, 3, winOut, slide
    animation = windowsMove, 1, 4, smooth
    animation = border, 1, 5, smooth
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 5, overshot, slidevert
}

# ── Dwindle ──────────────────────────────────
dwindle {
    preserve_split = true
}

# ── Misc ─────────────────────────────────────
misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
}

# ── Input ────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# ── Keybinds ─────────────────────────────────
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, X, pseudo,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -no-show-icons -theme-str "element-text { horizontal-align: 0; }" -theme-str "prompt { enabled: false; }" -theme-str "entry { placeholder: \"搜索\"; }" | cliphist decode | wl-copy
bind = CTRL ALT, DELETE, exec, ~/.local/bin/power-menu.fish

# Workspace navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = CTRL $mainMod, up, workspace, -1
bind = CTRL $mainMod, down, workspace, +1

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ── Screenshot ───────────────────────────────
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && wl-copy < ~/Pictures/screenshots/$(ls -t ~/Pictures/screenshots | head -1)
bind = SHIFT, Print, exec, grim ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png && wl-copy < ~/Pictures/screenshots/$(ls -t ~/Pictures/screenshots | head -1)

# ── Window Rules ─────────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Layer Rules
layerrule {
    name = waybar
    match:namespace = waybar
    blur = true
}

layerrule {
    name = rofi
    match:namespace = rofi
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = mako
    match:namespace = mako
    blur = true
    ignore_alpha = 0.2
}

# ba-rice character theme
source = ~/.ba-rice/configs/hyprland-character.conf
